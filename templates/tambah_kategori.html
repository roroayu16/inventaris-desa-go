<!DOCTYPE html>
<html>
    <head>

    <title>Tambah Kategori</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <style>

        body{
            background-color:#eef6ef;
        }

        .card{
            border:none;
            border-radius:12px;
            box-shadow:0 2px 8px rgba(0,0,0,.08);
        }

        .navbar{
            min-height: 70px;
        }

        .navbar-brand{
            font-size: 1.35rem;
        }

        .nav-link{
            font-weight: 500;
        }

        .nav-link:hover{
            color: #198754 !important;
        }

        .dropdown-item:hover{
            background: #eef6ef;
        }

    </style>

    </head>

    <body>
        <div class="container mt-4">
            <div class="mb-3">
                <a  href="/kategori"
                    class="btn btn-secondary">
                    ← Kembali
                </a>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="mb-4">
                        <h1 class="fw-bold mb-1">
                            Tambah Kategori
                        </h1>

                        <p class="text-muted mb-0">
                            Tambahkan kategori inventaris baru
                        </p>
                    </div>

                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">
                                Kode Kategori
                            </label>

                            <input type="text"
                                    name="kode"
                                    class="form-control"
                                    placeholder="Contoh: ATK"
                                    required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Nama Kategori
                            </label>

                            <input type="text"
                                    name="nama"
                                    class="form-control"
                                    placeholder="Contoh: Alat Tulis Kantor"
                                    required>
                        </div>

                        <div class="mt-4">
                            <button
                                type="submit"
                                class="btn btn-success">
                                Simpan
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </body>

</html>
