<!DOCTYPE html>
<html>
    <head>
        <title>Tambah Barang</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
            rel="stylesheet">
        
        <style>
            body {
                background-color: #eef6ef;
            }
            .card{
                border:none;
                border-radius:12px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            }
        </style>
    </head>
    
    <body>
        <div class="container mt-4">
            
            <div class="mb-3">
                <a  href="/barang"
                    class="btn btn-secondary">
                    ← Kembali
                </a>
            </div>

            <div class="card shadow">
                <div class="card-body">
                    
                    <div class="mb-4">

                        <h1 class="fw-bold mb-1">
                            Tambah Barang
                        </h1>

                        <p class="text-muted mb-0">
                            Input data inventaris barang baru
                        </p>

                    </div>
                    
                    <form method="POST">

                        <div class="row">

                            <div class="col-md-12">
                                <label class="form-label">
                                    Kategori
                                </label>

                                <select
                                    name="kategori_id"
                                    class="form-select"
                                    required>

                                    <option value="">
                                        Pilih Kategori
                                    </option>

                                    {{range .Kategori}}
                                    <option value="{{.ID}}">
                                        {{.Nama}}
                                    </option>
                                    {{end}}

                                </select>
                            </div>

                        </div>

                        <div class="row mt-3">

                            <div class="col-md-6">
                                <label class="form-label">
                                    Nama Barang
                                </label>

                                <input
                                    type="text"
                                    name="nama"
                                    class="form-control"
                                    required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">
                                    Tempat
                                </label>

                                <input
                                    type="text"
                                    name="tempat"
                                    class="form-control"
                                    required>
                            </div>

                        </div>

                        <div class="row mt-3">

                            <div class="col-md-6">
                                <label class="form-label">
                                    Stok Awal
                                </label>

                                <input
                                    type="number"
                                    name="jumlah"
                                    class="form-control"
                                    required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">
                                    Kondisi
                                </label>

                                <select
                                    name="kondisi"
                                    class="form-select">

                                    <option>Baik</option>
                                    <option>Rusak Ringan</option>
                                    <option>Rusak Berat</option>

                                </select>
                            </div>

                        </div>

                        <div class="d-flex justify-content-between mt-4">

                            <button
                                class="btn btn-success"
                                type="submit">

                                Simpan

                            </button>

                        </div>

                    </form>                    

                </div>
            </div>
        </div>
    </body>

</html>
