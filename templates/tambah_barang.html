<!DOCTYPE html>
<html>
    <head>
        <title>Tambah Barang</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
            rel="stylesheet">
        
        <link 
            rel="stylesheet" 
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        
        <link
            href="/static/css/style.css"
            rel="stylesheet">
    </head>
    
    <body>
        <div class="container mt-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                
                <div>
                    <h1 class="fw-bold mb-1">
                        Tambah Barang
                    </h1>

                    <p class="text-muted mb-0">
                        Input data inventaris barang baru
                    </p>
                </div>

                <a  href="/barang"
                    class="btn btn-secondary">
                    <i class="bi bi-arrow-left me-1"></i>
                    Kembali
                </a>

            </div>

            <div class="card">
                <div class="card-body">
                    
                    <form method="POST">
                        <div class="row">
                            <div class="col-md-12">
                                <label class="form-label">
                                    Kategori
                                </label>

                                <select
                                    name="kategori_id"
                                    class="form-select"
                                    required>

                                    <option value="">
                                        Pilih Kategori
                                    </option>

                                    {{range .Data.Kategori}}
                                    <option value="{{.ID}}">
                                        {{.Nama}}
                                    </option>

                                    {{end}}
                                </select>
                            </div>
                        </div>

                        <div class="row mt-3">
                            <div class="col-md-6">
                                <label class="form-label">
                                    Nama Barang
                                </label>

                                <input
                                    type="text"
                                    name="nama"
                                    class="form-control"
                                    required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">
                                    Tempat
                                </label>

                                <input
                                    type="text"
                                    name="tempat"
                                    class="form-control"
                                    required>
                            </div>
                        </div>

                        <div class="row mt-3">
                            <div class="col-md-6">
                                <label class="form-label">
                                    Stok Awal
                                </label>

                                <input
                                    type="number"
                                    name="jumlah"
                                    class="form-control"
                                    required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">
                                    Kondisi
                                </label>

                                <select
                                    name="kondisi"
                                    class="form-select">

                                    <option>Baik</option>
                                    <option>Rusak Ringan</option>
                                    <option>Rusak Berat</option>
                                </select>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <button
                                class="btn btn-success px-4"
                                type="submit">
                                <i class="bi bi-floppy me-1"></i>
                                Simpan
                            </button>
                        </div>
                    </form>                    

                </div>
            </div>

        </div>
    </body>

</html>
