<!DOCTYPE html>
<html>
    <head>
        <title>Edit Barang</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
            rel="stylesheet">
        
        <link 
            rel="stylesheet" 
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        
        <link
            href="/static/css/style.css"
            rel="stylesheet">

    </head>

    <body>
        <div class="container mt-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                
                <div>
                    <h1 class="fw-bold mb-1">
                        Edit Barang
                    </h1>

                    <p class="text-muted mb-0">
                        Perbarui data inventaris barang
                    </p>
                </div>

                <a  href="/barang"
                    class="btn btn-secondary">
                    <i class="bi bi-arrow-left me-1"></i>
                    Kembali
                </a>

            </div>

            <div class="card">
                <div class="card-body">

                    <form method="POST">
                        <input 
                            type="hidden"
                            name="id"
                            value="{{.Data.Barang.ID}}">

                        <div class="row mb-3">
                            <div class="col-md-12">
                                <label class="form-label">
                                    Kategori
                                </label>

                                <select 
                                    name="kategori_id" 
                                    class="form-select"
                                    required>

                                    {{range .Data.Kategori}}
                                    <option 
                                        value="{{.ID}}"
                                        {{if eq .ID $.Data.Barang.KategoriID}}selected{{end}}>
                                        {{.Nama}}
                                    </option>
                                    {{end}}

                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <label class="form-label">
                                    Nama Barang
                                </label>
                                <input 
                                    type="text"
                                    name="nama"
                                    value="{{.Data.Barang.Nama}}"
                                    class="form-control"
                                    required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">
                                    Tempat
                                </label>
                                <input 
                                    type="text" 
                                    name="tempat"
                                    value="{{.Data.Barang.Tempat}}"
                                    class="form-control"
                                    required>
                            </div>    
                        </div>
                        
                        <div class="row mt-3">
                            <div class="col-md-6">
                                <label class="form-label">
                                    Stok Awal
                                </label>
                                <input 
                                    type="number"
                                    value="{{.Data.Barang.StokAwal}}"
                                    class="form-control"
                                    readonly>
                                
                                <div class="form-text">
                                    Stok hanya dapat berubah melalui
                                    Barang Masuk atau Barang Keluar
                                </div>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label">
                                    Kondisi
                                </label>
                                <select 
                                    name="kondisi" 
                                    class="form-select">

                                    <option value="Baik"
                                        {{if eq .Data.Barang.Kondisi "Baik"}}selected{{end}}>
                                        Baik
                                    </option>

                                    <option value="Rusak Ringan"
                                        {{if eq .Data.Barang.Kondisi "Rusak Ringan"}}selected{{end}}>
                                        Rusak Ringan
                                    </option>

                                    <option value="Rusak Berat"
                                        {{if eq .Data.Barang.Kondisi "Rusak Berat"}}selected{{end}}>
                                        Rusak Berat
                                    </option>

                                </select>
                            </div>
                        </div>

                        <div class="mt-4">
                            <a  href="/barang"
                                class="btn btn-secondary px-4">
                                <i class="bi bi-x-circle me-1"></i>
                                Batal
                            </a>

                            <button
                                type="submit"
                                class="btn btn-warning px-4">
                                <i class="bi bi-floppy me-1"></i>
                                Simpan Perubahan
                            </button>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </body>

</html>
