<!DOCTYPE html>
<html>
    <head>
        <title>Barang Masuk</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
            rel="stylesheet">
        
        <link
            href="/static/css/style.css"
            rel="stylesheet">

    </head>
    
    <body>
        {{template "navbar" .}}
        {{template "flash" .}}

        <div class="container mt-4">
            <div class="mb-3">
                <a  href="/"
                    class="btn btn-secondary">
                ← Kembali
                </a>
            </div>

            <div class="card shadow">
                <div class="card-body">
                    
                    <div class="mb-4">

                        <h1 class="fw-bold mb-1">
                            Barang Masuk
                        </h1>

                        <p class="text-muted mb-0">
                            Pencatatan transaksi barang masuk
                        </p>

                    </div>
                    
                    <form method="POST">
                        <div class="row">
                            <div class="col-md-3">
                                <label class="form-label">
                                    Kode Barang
                                </label>

                                <select 
                                    id="barangSelect"
                                    name="barang_id"
                                    class="form-select">

                                    {{range .Data.BarangList}}

                                    <option value="{{.ID}}"
                                            data-kategori="{{.Kategori}}"
                                            data-nama="{{.Nama}}"
                                            data-tempat="{{.Tempat}}"
                                            data-kondisi="{{.Kondisi}}">
                                        {{.KodeBarang}} - {{.Nama}}
                                    </option>
                                    {{end}}
                                </select>
                            </div>

                            <div class="col-md-3">
                                <label class="form-label">
                                    Kategori
                                </label>

                                <input 
                                    type="text"
                                    id="kategoriBarang"
                                    class="form-control bg-body-secondary"
                                    readonly>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">
                                    Nama Barang
                                </label>

                                <input 
                                    type="text"
                                    id="namaBarang"
                                    class="form-control bg-body-secondary"
                                    readonly>
                            </div>
                        </div>
                    
                        <div class="row mt-3">
                            <div class="col-md-6">
                                <label class="form-label">
                                    Tempat
                                </label>

                                <input 
                                    type="text"
                                    id="tempatBarang"
                                    class="form-control bg-body-secondary"
                                    readonly>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">
                                    Kondisi
                                </label>

                                <div
                                    id="kondisiBarang"
                                    class="form-control bg-body-secondary d-flex align-items-center">
                                </div>

                            </div>
                        </div>

                        <div class="row mt-3">
                            <div class="col-md-6">
                                <label class="form-label">
                                    Jumlah Masuk
                                </label>

                                <input 
                                    type="number"
                                    name="jumlah"
                                    class="form-control"
                                    required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">
                                    Tanggal
                                </label>

                                <input 
                                    type="date"
                                    name="tanggal"
                                    class="form-control"
                                    required>
                            </div>

                            <div class="mt-3">
                                <label class="form-label">
                                    Keterangan
                                </label>

                                <textarea 
                                    name="keterangan"
                                    class="form-control"
                                    rows="3"
                                    placeholder="Contoh: Pembelian ATK bulan Juni"></textarea>
                            </div>
                        </div>

                        <div class="mt-4">
                            <button 
                                type="submit"
                                class="btn btn-success">
                                Simpan
                            </button>
                        </div>
                        
                    </form>

                </div>
            </div>

            <div class="card shadow mt-4">
                <div class="card-body">
                    <h3>Riwayat Barang Masuk</h3>

                    <table class="table table-striped">

                        <thead>
                            <tr>
                                <th>Tanggal</th>
                                <th>Kode</th>
                                <th>Nama Barang</th>
                                <th>Jumlah</th>
                                <th>Keterangan</th>
                            </tr>
                        </thead>

                        <tbody>
                            {{range .Data.RiwayatList}}

                            <tr>
                                <td>{{.Tanggal}}</td>
                                <td>{{.KodeBarang}}</td>
                                <td>{{.NamaBarang}}</td>
                                <td>
                                    <span class="badge bg-success">
                                        {{.Jumlah}}
                                    </span>                        
                                </td>
                                <td>{{.Keterangan}}</td>
                            </tr>

                            {{end}}

                        </tbody>

                    </table>

                </div>
            </div>
        </div>    
    
    <script>
    function updateBarangInfo() {

        const select =
            document.getElementById("barangSelect");

        const option =
            select.options[select.selectedIndex];

        document.getElementById("kategoriBarang").value =
            option.dataset.kategori;

        document.getElementById("namaBarang").value =
            option.dataset.nama;

        document.getElementById("tempatBarang").value =
            option.dataset.tempat;

        const kondisi = option.dataset.kondisi;

        const badge = document.getElementById("kondisiBarang");

        if (kondisi === "Baik") {
            badge.innerHTML =
                '<span class="badge bg-success">Baik</span>';
        } else if (kondisi === "Rusak Ringan") {
            badge.innerHTML =
                '<span class="badge bg-warning text-dark">Rusak Ringan</span>';
        } else {
            badge.innerHTML =
                '<span class="badge bg-danger">Rusak Berat</span>';
        }
    }

    document
        .getElementById("barangSelect")
        .addEventListener("change", updateBarangInfo);

    updateBarangInfo();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    </body>

</html>
